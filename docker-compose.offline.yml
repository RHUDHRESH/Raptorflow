version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: raptorflow_dev
      POSTGRES_USER: raptorflow
      POSTGRES_PASSWORD: raptorflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_offline_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    health:
      test: ["CMD-SHELL", "pg_isready -U raptorflow -d raptorflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  dragonfly:
    image: dragonflydb/dragonfly
    ports:
      - "6379:6379"
    command: >
      --maxmemory=256mb
      --save_schedule="*:*"
      --dbfilename=offline_dragonfly.rdb
    health:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_offline_data:/qdrant/storage
    health:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,s3
      DEBUG: "1"
      LOCALSTACK_HOST: localstack
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    health:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q 'running'"]
      interval: 10s
      timeout: 5s
      retries: 10

  groq:
    image: ghcr.io/groq/groq-api:latest
    ports:
      - "8081:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-lm-local-dev-key}
    health:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/v1/models | grep -q 'models'"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  mock-office:
    build:
      context: .
      dockerfile: scripts/Dockerfile.mock-office
    ports:
      - "3001:3001"
    environment:
      WS_PORT: "3001"
      EVENT_INTERVAL_MS: "3500"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_offline_data:
  qdrant_offline_data:
  localstack_data:

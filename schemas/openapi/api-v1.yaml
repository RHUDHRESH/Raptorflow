openapi: 3.1.0
info:
  title: RaptorFlow API
  version: 0.1.0
servers:
  - url: https://api.raptorflow.example.com
paths:
  /health/live:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Service is live
  /health/ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Dependencies healthy
        "503":
          description: Dependency failure
  /api/v1/webhooks/clerk:
    post:
      summary: Receive Clerk webhook
      responses:
        "202":
          description: Webhook accepted
  /api/v1/webhooks/razorpay:
    post:
      summary: Receive Razorpay webhook
      responses:
        "202":
          description: Webhook accepted
  /api/v1/billing:
    get:
      summary: Fetch billing status
      responses:
        "200":
          description: Billing state
  /api/v1/billing/orders:
    post:
      summary: Create order
      responses:
        "202":
          description: Order accepted
  /api/v1/billing/subscriptions/{id}:
    get:
      summary: Get subscription
      responses:
        "200":
          description: Subscription
  /api/v1/billing/subscriptions/{id}/cancel:
    post:
      summary: Cancel subscription
      responses:
        "202":
          description: Cancellation accepted
  /api/v1/uploads:
    post:
      summary: Generate upload URL
      responses:
        "200":
          description: Upload URL
  /api/v1/uploads/download:
    get:
      summary: Generate download URL
      responses:
        "200":
          description: Download URL
  /api/v1/uploads/{key}:
    delete:
      summary: Delete upload
      responses:
        "204":
          description: Deleted
  /api/v1/screenshots:
    post:
      summary: Generate screenshot upload URL
      responses:
        "200":
          description: Upload URL
  /api/v1/exports:
    post:
      summary: Generate export URL
      responses:
        "200":
          description: Export URL
  /api/v1/exports/download:
    get:
      summary: Generate export download URL
      responses:
        "200":
          description: Download URL
  /api/v1/foundation:
    get:
      summary: Get current foundation snapshot
      responses:
        "200":
          description: Snapshot found
        "404":
          description: Foundation not found
    post:
      summary: Create foundation snapshot
      responses:
        "200":
          description: Snapshot created
  /api/v1/foundation/scan/start:
    post:
      summary: Start foundation scan
      responses:
        "200":
          description: Scan started
  /api/v1/foundation/scan/quick:
    post:
      summary: Quick scan endpoint
      responses:
        "200":
          description: Quick scan triggered
  /api/v1/foundation/scan/deep:
    post:
      summary: Deep scan endpoint
      responses:
        "200":
          description: Deep scan triggered
  /api/v1/foundation/scans/{scanId}:
    get:
      summary: Get foundation scan by ID
      responses:
        "200":
          description: Scan found
        "404":
          description: Scan not found
  /api/v1/foundation/scan/status:
    get:
      summary: Get latest foundation scan status
      responses:
        "200":
          description: Scan status
  /api/v1/foundation/section/{section}:
    patch:
      summary: Update foundation section
      responses:
        "200":
          description: Section updated
  /api/v1/foundation/snapshot:
    get:
      summary: Get full foundation section snapshot
      responses:
        "200":
          description: Snapshot data
  /api/v1/foundation/complete:
    post:
      summary: Complete foundation flow
      responses:
        "200":
          description: Foundation completed
  /api/v1/foundation/snapshots:
    get:
      summary: List foundation snapshots
      responses:
        "200":
          description: Snapshot list
    post:
      summary: Create foundation snapshot from current state
      responses:
        "200":
          description: Snapshot created
  /api/v1/foundation/snapshots/{id}:
    get:
      summary: Get foundation snapshot by id
      responses:
        "200":
          description: Snapshot found
        "404":
          description: Snapshot not found
  /api/v1/foundation/snapshots/{id}/restore:
    post:
      summary: Restore foundation snapshot
      responses:
        "200":
          description: Snapshot restored
  /api/v1/foundation/versions:
    get:
      summary: List foundation versions
      responses:
        "200":
          description: Version list
  /api/v1/foundation/versions/{versionId}:
    get:
      summary: Get foundation version by ID
      responses:
        "200":
          description: Version found
        "404":
          description: Version not found
  /api/v1/foundation/versions/{versionId}/sections/{section}:
    get:
      summary: Get section from foundation version
      responses:
        "200":
          description: Section found
        "404":
          description: Section not found
  /api/v1/prl/ripples:
    get:
      summary: List ripples
      responses:
        "200":
          description: Ripple list
    post:
      summary: Create ripple
      responses:
        "201":
          description: Ripple created
  /api/v1/prl/ripples/{id}:
    get:
      summary: Get ripple
      responses:
        "200":
          description: Ripple
        "404":
          description: Ripple not found
    put:
      summary: Update ripple
      responses:
        "200":
          description: Ripple updated
    delete:
      summary: Delete ripple
      responses:
        "204":
          description: Ripple deleted
  /api/v1/prl/ripples/{id}/edges:
    get:
      summary: List ripple edges
      responses:
        "200":
          description: Edge list
    post:
      summary: Create ripple edge
      responses:
        "201":
          description: Edge created
  /api/v1/prl/ripples/edges/{edge_id}:
    delete:
      summary: Delete ripple edge
      responses:
        "204":
          description: Edge deleted
  /api/v1/prl/essences:
    get:
      summary: List essences
      responses:
        "200":
          description: Essence list
    post:
      summary: Create essence
      responses:
        "201":
          description: Essence created
  /api/v1/prl/essences/{id}:
    get:
      summary: Get essence
      responses:
        "200":
          description: Essence
        "404":
          description: Essence not found
    put:
      summary: Update essence
      responses:
        "200":
          description: Essence updated
  /api/v1/prl/decay:
    post:
      summary: Run decay
      responses:
        "200":
          description: Decay applied
  /api/v1/intel:
    get:
      summary: Get intel overview
      responses:
        "200":
          description: Intel overview
  /api/v1/intel/runs:
    get:
      summary: List research runs
      responses:
        "200":
          description: Research run list
  /api/v1/intel/documents:
    get:
      summary: List research documents
      responses:
        "200":
          description: Research documents
  /api/v1/jobs/research:
    post:
      summary: Execute research request
      responses:
        "200":
          description: Grounded result
  /api/v1/jobs/tool-gateway:
    post:
      summary: Execute tool request through grounded research pipeline
      responses:
        "200":
          description: Tool execution result
  /api/v1/nudges:
    get:
      summary: List nudges
      responses:
        "200":
          description: Nudge list
    post:
      summary: Create nudge
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [user_id, nudge_type, priority, title, body, source_type, source_id]
              properties:
                user_id:
                  type: string
                nudge_type:
                  type: string
                priority:
                  type: string
                title:
                  type: string
                body:
                  type: string
                action_type:
                  type: string
                action_data:
                  type: object
                source_type:
                  type: string
                source_id:
                  type: string
      responses:
        "201":
          description: Nudge created
        "400":
          description: Invalid request
  /api/v1/nudges/{id}:
    get:
      summary: Get nudge by ID
      responses:
        "200":
          description: Nudge found
        "404":
          description: Nudge not found
  /api/v1/campaigns:
    get:
      summary: List campaigns
      responses:
        "200":
          description: Campaign list
    post:
      summary: Create campaign
      responses:
        "201":
          description: Campaign created
  /api/v1/campaigns/{id}:
    get:
      summary: Get campaign with moves and tasks
      responses:
        "200":
          description: Campaign detail
        "404":
          description: Campaign not found
  /api/v1/campaigns/{id}/status:
    patch:
      summary: Update campaign status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [draft, active, paused, completed, archived]
      responses:
        "200":
          description: Status updated
        "400":
          description: Invalid status
        "404":
          description: Campaign not found
  /api/v1/campaigns/{id}/moves:
    get:
      summary: List campaign moves
      responses:
        "200":
          description: Move list
        "404":
          description: Campaign not found
    post:
      summary: Create campaign move
      responses:
        "201":
          description: Move created
        "404":
          description: Campaign not found
  /api/v1/campaigns/{id}/moves/{move_id}/status:
    patch:
      summary: Update move status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [planned, in_progress, completed, skipped]
      responses:
        "200":
          description: Status updated
        "400":
          description: Invalid status
  /api/v1/campaigns/{id}/tasks:
    get:
      summary: List campaign tasks
      responses:
        "200":
          description: Task list
        "404":
          description: Campaign not found
    post:
      summary: Create campaign task
      responses:
        "201":
          description: Task created
        "404":
          description: Campaign not found
  /api/v1/campaigns/{id}/tasks/{task_id}/status:
    patch:
      summary: Update task status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, completed, cancelled]
      responses:
        "200":
          description: Status updated
        "400":
          description: Invalid status
  /api/v1/campaigns/{id}/brief:
    get:
      summary: Get campaign brief
      responses:
        "200":
          description: Brief found or null
        "404":
          description: Campaign not found
    post:
      summary: Create campaign brief
      responses:
        "201":
          description: Brief created
        "404":
          description: Campaign not found
  /api/v1/campaigns/{id}/brief/status:
    patch:
      summary: Update brief status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [draft, submitted, approved, rejected]
      responses:
        "200":
          description: Status updated
        "400":
          description: Invalid status
        "404":
          description: Brief not found
  /api/v1/council:
    post:
      summary: Start council session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                campaign_id:
                  type: string
                agent_roster:
                  type: array
                  items:
                    type: string
                question:
                  type: string
                session_type:
                  type: string
      responses:
        "201":
          description: Session created
        "400":
          description: Invalid request
    get:
      summary: List council sessions
      responses:
        "200":
          description: Session list
  /api/v1/council/{session_id}:
    get:
      summary: Get council session with positions
      responses:
        "200":
          description: Session detail
        "404":
          description: Session not found
  /api/v1/council/{session_id}/messages:
    get:
      summary: Get agent positions for a session
      responses:
        "200":
          description: Agent positions
        "404":
          description: Session not found
  /api/v1/muse:
    post:
      summary: Submit prompt to Muse
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                route:
                  type: string
                conversation_id:
                  type: string
      responses:
        "200":
          description: Prompt submitted
        "400":
          description: Prompt required
    get:
      summary: List Muse conversations
      responses:
        "200":
          description: Conversation list
  /api/v1/muse/{conversation_id}:
    get:
      summary: Get Muse conversation with messages
      responses:
        "200":
          description: Conversation detail
        "404":
          description: Conversation not found
  /api/v1/muse/{conversation_id}/messages:
    get:
      summary: Get messages for a Muse conversation
      responses:
        "200":
          description: Message list
        "404":
          description: Conversation not found
  /api/v1/nudges/{id}/viewed:
    post:
      summary: Mark nudge as viewed
      responses:
        "200":
          description: Status updated
        "404":
          description: Nudge not found
  /api/v1/nudges/{id}/dismissed:
    post:
      summary: Dismiss nudge
      responses:
        "200":
          description: Status updated
        "404":
          description: Nudge not found
  /api/v1/daily-wins:
    get:
      summary: List daily wins
      responses:
        "200":
          description: Daily win list
    post:
      summary: Create daily win
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  briefing_date,
                  lead_summary,
                  full_briefing,
                  recommended_action,
                  recommended_action_type,
                ]
              properties:
                briefing_date:
                  type: string
                  format: date
                lead_summary:
                  type: string
                full_briefing:
                  type: string
                recommended_action:
                  type: string
                recommended_action_type:
                  type: string
                recommended_action_data:
                  type: object
      responses:
        "201":
          description: Daily win created
        "400":
          description: Invalid request
  /api/v1/daily-wins/today:
    get:
      summary: Get today's daily win
      responses:
        "200":
          description: Today's daily win or null
  /api/v1/daily-wins/{id}/viewed:
    post:
      summary: Mark daily win as viewed
      responses:
        "200":
          description: Status updated
        "404":
          description: Daily win not found
  /api/v1/daily-wins/{id}/acted:
    post:
      summary: Mark daily win as acted upon
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
      responses:
        "200":
          description: Status updated
        "404":
          description: Daily win not found
  /api/v1/campaigns/{id}/replan:
    get:
      summary: List replan sessions for a campaign
      responses:
        "200":
          description: Replan session list
        "404":
          description: Campaign not found
    post:
      summary: Trigger a replan for a campaign
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [trigger_type]
              properties:
                trigger_type:
                  type: string
                  enum: [manual, automatic, milestone, performance]
      responses:
        "201":
          description: Replan session created
        "400":
          description: Invalid trigger type
        "404":
          description: Campaign not found
  /api/v1/content:
    get:
      summary: List generated content
      responses:
        "200":
          description: Content list
    post:
      summary: Store generated content
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content_type, body]
              properties:
                campaign_id:
                  type: string
                task_id:
                  type: string
                content_type:
                  type: string
                body:
                  type: object
      responses:
        "201":
          description: Content created
        "400":
          description: Invalid request
  /api/v1/content/{id}:
    get:
      summary: Get content by ID
      responses:
        "200":
          description: Content found
        "404":
          description: Content not found

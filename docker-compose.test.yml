services:
  backend-tests:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install --disable-pip-version-check --no-cache-dir -r backend/requirements.txt &&
      python -m pytest backend/tests -q --no-cov"
    env_file:
      - backend/.env.test
    environment:
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    depends_on:
      redis:
        condition: service_started

  frontend-tests:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "npm ci && npm run type-check && npm run build"
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://backend-tests:8000"
      NEXT_PUBLIC_API_URL: "http://backend-tests:8000"
    volumes:
      - ./:/workspace
      - node_modules:/workspace/node_modules
      - next_cache:/workspace/.next
    depends_on:
      backend-tests:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

volumes:
  node_modules:
  next_cache:

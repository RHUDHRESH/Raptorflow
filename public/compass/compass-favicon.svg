<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" stroke="#2A2529" stroke-width="3" fill="none"/>
  
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="35" stroke="#2A2529" stroke-width="1" stroke-opacity="0.2" fill="none" stroke-dasharray="4 4"/>
  
  <!-- Cardinal marker (North) -->
  <line x1="50" y1="8" x2="50" y2="18" stroke="#2A2529" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>
  
  <!-- The Needle - Diamond shape -->
  <path d="M50 15L56 50L50 82L44 50L50 15Z" fill="#2A2529"/>
  
  <!-- Center pivot -->
  <circle cx="50" cy="50" r="8" fill="#F3F0E7" stroke="#2A2529" stroke-width="2"/>
  <circle cx="50" cy="50" r="4" fill="#2A2529"/>
</svg>

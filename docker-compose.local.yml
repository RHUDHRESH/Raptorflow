services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install --disable-pip-version-check --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - path: backend/.env.example
        required: false
      - path: .env
        required: false
      - path: .env.local
        required: false
      - path: backend/.env
        required: false
    environment:
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    env_file:
      - path: .env.example
        required: false
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      BACKEND_API_URL: "http://backend:8000"
      NEXT_PUBLIC_BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: "http://backend:8000"
    volumes:
      - ./:/workspace
      - node_modules:/workspace/node_modules
      - next_cache:/workspace/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

volumes:
  node_modules:
  next_cache:

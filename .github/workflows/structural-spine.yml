name: Structural Spine

on:
  push:
    branches:
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  structural-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/postgres
        run: pnpm --filter @raptorflow/database generate

      - name: Build database package (emit dist/index.d.ts for typecheck)
        env:
          DATABASE_URL: postgres://testuser:testpass@localhost:5432/postgres
        run: pnpm --filter @raptorflow/database build

      - name: Structural check - no Prisma in product runtime
        run: pnpm structural:check

      - name: Structural check - route parity
        run: pnpm route-parity:check

      - name: Structural check - runtime authority
        run: pnpm runtime-authority:check

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Rust compilation check
        run: cargo check --workspace

  db-transaction-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=128mb

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Wait for PostgreSQL to be ready
        run: pg_isready -h localhost -p 5432 -U testuser

      - name: Grant CREATEDB to testuser
        run: |
          CONTAINER_ID=$(docker ps -q --filter "ancestor=pgvector/pgvector:pg16")
          docker exec $CONTAINER_ID psql -U testuser -c "ALTER USER testuser CREATEDB;"

      - name: Run DB transaction integration tests
        env:
          TEST_DATABASE_URL: postgres://testuser:testpass@localhost:5432/postgres
        run: cargo test -p raptorflow-db --test generated_moves_transaction -- --nocapture --test-threads=1

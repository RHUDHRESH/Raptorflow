name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: raptorflow-api
      ECS_CLUSTER: raptorflow-prod
      ECS_SERVICE: raptorflow-api
      ECS_MIGRATION_TASK: raptorflow-migrate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: cargo build --release -p raptorflow-api
      - run: docker build -f infra/docker/api/Dockerfile -t "$ECR_REPOSITORY:${GITHUB_SHA}" .
      - run: docker tag "$ECR_REPOSITORY:${GITHUB_SHA}" "${{ secrets.ECR_REGISTRY }}/$ECR_REPOSITORY:${GITHUB_SHA}"
      - run: docker push "${{ secrets.ECR_REGISTRY }}/$ECR_REPOSITORY:${GITHUB_SHA}"
      - name: Register new task definition
        id: render-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition raptorflow-api --query 'taskDefinition.taskDefinitionArn' --output text)
          CONTAINER_DEF=$(aws ecs describe-task-definition --task-definition raptorflow-api --query 'taskDefinition.containerDefinitions' --output json | jq '.[0].image = "${{ secrets.ECR_REGISTRY }}/$ECR_REPOSITORY:'"${GITHUB_SHA}"'"')
          NEW_TASK_DEF=$(aws ecs register-task-definition --family raptorflow-api --container-definitions "$CONTAINER_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "new-task-def-arn=$NEW_TASK_DEF" >> "$GITHUB_OUTPUT"
      - name: Run migrations
        run: |
          MIGRATION_TASK_ARN=$(aws ecs run-task --cluster "$ECS_CLUSTER" --task-definition "$ECS_MIGRATION_TASK" --query 'tasks[0].taskArn' --output text)
          echo "Waiting for migration task $MIGRATION_TASK_ARN to complete..."
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$MIGRATION_TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$MIGRATION_TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully"
      - name: Deploy and wait for service stability
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.render-task-def.outputs.new-task-def-arn }}" \
            --force-new-deployment

          echo "Waiting for $ECS_SERVICE in $ECS_CLUSTER to become stable..."
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].deployments[].{status:status,rolloutState:rolloutState,taskDefinition:taskDefinition,desired:desiredCount,running:runningCount,pending:pendingCount}' \
            --output table

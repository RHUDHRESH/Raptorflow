name: RaptorFlow CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  # =============================================
  # ROOT HYGIENE GATE
  # =============================================

  root-hygiene:
    name: Root Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enforce root hygiene policy
        run: python scripts/audit/check_root_hygiene.py

  # =============================================
  # FRONTEND QUALITY GATES
  # =============================================

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [root-hygiene]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # =============================================
  # BACKEND QUALITY GATES
  # =============================================

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [root-hygiene]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 mypy black

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=120 --extend-ignore=E203,E501,W503,F401

      - name: Format check (black)
        run: black --check --diff backend/

      - name: Type check (mypy)
        run: mypy backend/ --ignore-missing-imports

  # =============================================
  # BACKEND TESTS
  # =============================================

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-quality]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_raptorflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_raptorflow
          REDIS_URL: redis://localhost:6379
          PYTHONPATH: .

  # =============================================
  # SMOKE TESTS
  # =============================================

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend-quality, backend-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: npm run smoke

  # =============================================
  # SECURITY SCAN
  # =============================================

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend-quality, backend-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r backend/requirements.txt

      - name: Run Bandit
        run: bandit -r backend/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run Safety
        run: safety check --json --output safety-report.json || true
        continue-on-error: true

      - name: NPM Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # =============================================
  # QUALITY GATE SUMMARY
  # =============================================

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [root-hygiene, frontend-quality, backend-quality, backend-tests, smoke-tests]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "RaptorFlow Quality Gate Summary"
          echo "================================="
          echo ""
          echo "Frontend Quality: ${{ needs.frontend-quality.result }}"
          echo "Backend Quality: ${{ needs.backend-quality.result }}"
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo "Root Hygiene: ${{ needs.root-hygiene.result }}"
          echo ""

          if [[ "${{ needs.root-hygiene.result }}" == "success" && \
                "${{ needs.frontend-quality.result }}" == "success" && \
                "${{ needs.backend-quality.result }}" == "success" && \
                "${{ needs.backend-tests.result }}" == "success" && \
                "${{ needs.smoke-tests.result }}" == "success" ]]; then
            echo "All quality gates passed!"
            exit 0
          else
            echo "Quality gates failed!"
            exit 1
          fi

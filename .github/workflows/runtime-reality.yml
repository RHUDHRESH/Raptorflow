name: Runtime Reality Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_bedrock:
        description: "Run Bedrock smoke test (requires AWS secrets)"
        required: false
        default: "false"
        type: boolean

jobs:
  db-qdrant-smoke:
    name: DB & Qdrant Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=128mb
      qdrant:
        image: qdrant/qdrant:v1.17.1
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Wait for PostgreSQL
        run: pg_isready -h localhost -p 5432 -U postgres

      - name: Wait for Qdrant
        run: curl -f http://localhost:6333/healthz || exit 1

      - name: Grant CREATEDB
        run: |
          CONTAINER_ID=$(docker ps -q --filter "ancestor=pgvector/pgvector:pg16")
          docker exec $CONTAINER_ID psql -U postgres -d postgres -c "ALTER USER postgres CREATEDB;"

      - name: Create test DB
        run: |
          CONTAINER_ID=$(docker ps -q --filter "ancestor=pgvector/pgvector:pg16")
          docker exec $CONTAINER_ID psql -U postgres -d postgres -c "DROP DATABASE IF EXISTS raptorflow_test;"
          docker exec $CONTAINER_ID psql -U postgres -d postgres -c "CREATE DATABASE raptorflow_test;"
          docker exec $CONTAINER_ID psql -U postgres -d raptorflow_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run DB smoke test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/raptorflow_test
        run: cargo test -p raptorflow-db --test runtime_reality_smoke -- --nocapture --test-threads=1

      - name: Run Qdrant smoke
        run: node scripts/smoke/qdrant-smoke.mjs

  bedrock-smoke:
    name: Bedrock Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_bedrock == 'true'
    environment: bedrock-smoke

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Run Bedrock smoke test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.RAPTORFLOW_BEDROCK_REGION || secrets.AWS_REGION }}
          RAPTORFLOW_BEDROCK_REGION: ${{ secrets.RAPTORFLOW_BEDROCK_REGION || secrets.AWS_REGION }}
          RAPTORFLOW_BEDROCK_MODEL_FAST: ${{ secrets.RAPTORFLOW_BEDROCK_MODEL_FAST }}
          BEDROCK_SMOKE_TEST: "1"
        run: cargo test -p raptorflow-aws --test bedrock_smoke -- --nocapture --test-threads=1

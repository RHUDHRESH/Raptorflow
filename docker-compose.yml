services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
    working_dir: /workspace
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZnVua3ktc2NvcnBpb24tMjEuY2xlcmsuYWNjb3VudHMuZGV2JA
      RAPTORFLOW_QDRANT_URL: http://qdrant:6333
      RAPTORFLOW_QDRANT_API_KEY:
      RAPTORFLOW_QDRANT_COLLECTION: raptorflow_ripples
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      RAPTORFLOW_SENTRY_DSN: ${RAPTORFLOW_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-raptorflow}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-javascript-nextjs}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('node:http'); const req=http.get('http://127.0.0.1:3000/api/health',res=>{res.resume(); res.on('end',()=>process.exit(res.statusCode===200?0:1));}); req.setTimeout(5000,()=>{req.destroy(); process.exit(1)}); req.on('error',()=>process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    command: cargo run -p raptorflow-api
    working_dir: /workspace
    environment:
      APP_ENV: dev
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      RAPTORFLOW_BIND_ADDR: 0.0.0.0:8080
      RAPTORFLOW_DATABASE_URL: postgres://raptorflow:raptorflow@pgbouncer:6432/raptorflow
      RAPTORFLOW_DIRECT_DATABASE_URL: postgres://raptorflow:raptorflow@postgres:5432/raptorflow
      RAPTORFLOW_QDRANT_URL: http://qdrant:6333
      RAPTORFLOW_QDRANT_API_KEY:
      RAPTORFLOW_S3_BUCKET: raptorflow-dev
      RAPTORFLOW_SQS_BASE_URL: https://sqs.ap-south-1.amazonaws.com
      RAPTORFLOW_SQS_EMBEDDING_QUEUE: raptorflow-dev-embedding
      RAPTORFLOW_SQS_CONTENT_QUEUE: raptorflow-dev-content-pregeneration
      RAPTORFLOW_BEDROCK_REGION: ap-south-1
      RAPTORFLOW_BEDROCK_MODEL_STRATEGIST: mistral.mistral-large-3-675b-instruct
      RAPTORFLOW_BEDROCK_MODEL_FAST: mistral.ministral-3-8b-instruct
      RAPTORFLOW_SEARXNG_URL: http://searxng:8080
      RAPTORFLOW_CLERK_JWKS_URL: https://funky-scorpion-21.clerk.accounts.dev/.well-known/jwks.json
      RAPTORFLOW_CLERK_ISSUER: https://funky-scorpion-21.clerk.accounts.dev
      RAPTORFLOW_CLERK_WEBHOOK_SECRET: whsec_dev_replace_me
      RAPTORFLOW_RAZORPAY_KEY_ID: replace-me
      RAPTORFLOW_RAZORPAY_KEY_SECRET: replace-me
      RAPTORFLOW_RAZORPAY_WEBHOOK_SECRET: razorpay-dev-shared-secret
      RAPTORFLOW_WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS: 300
      RAPTORFLOW_RESEND_API_KEY: replace-me
      RAPTORFLOW_RESEND_FROM_EMAIL: onboarding@resend.dev
      RAPTORFLOW_RESEND_WEBHOOK_SECRET: whsec_dev_resend_replace_me
      RAPTORFLOW_SENTRY_DSN: ${RAPTORFLOW_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-raptorflow}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-javascript-nextjs}
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - cargo-target:/workspace/target
    depends_on:
      - postgres
      - pgbouncer
      - qdrant
      - searxng
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: raptorflow
      POSTGRES_USER: raptorflow
      POSTGRES_PASSWORD: raptorflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raptorflow -d raptorflow"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    command: ["/bin/sh", "-lc", "exec pgbouncer /etc/pgbouncer/pgbouncer.ini"]
    ports:
      - "6432:6432"
    volumes:
      - ./infra/docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U raptorflow -d raptorflow"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r status <&3; case \"$$status\" in *200*) exit 0 ;; *) exit 1 ;; esac'",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  searxng:
    image: searxng/searxng:latest
    container_name: raptorflow-searxng
    ports:
      - "8081:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    volumes:
      - searxng-data:/etc/searxng
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test&format=json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  cargo-target:
  web-node-modules:
  pnpm-store:
  postgres-data:
  qdrant-data:
  searxng-data:

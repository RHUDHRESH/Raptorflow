<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .stack { display:flex; flex-direction:column; gap: 18px; }
  .row { display:flex; align-items:baseline; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: var(--ink-400); letter-spacing: 0.16em; text-transform: uppercase; flex-shrink:0; width: 80px; }
  .specimen { font-family: var(--font-display); color: var(--ink-900); line-height: 1; letter-spacing: -0.012em; }
  .xl { font-size: 88px; }
  .lg { font-size: 60px; }
  .md { font-size: 38px; }
  .sm { font-size: 26px; color: var(--ink-500); font-style: italic; }
  .rule { height: 1px; background: var(--border); margin: 4px 0; }
  .ampersand { font-family: var(--font-display); font-style: italic; color: var(--primary); font-weight: 400; }
  .glyph-row { display:flex; gap: 22px; align-items:baseline; padding: 4px 0; }
  .glyph-row .g { font-family: var(--font-display); font-size: 56px; line-height:1; color: var(--ink-700); }
  .glyph-row .g.it { font-style: italic; color: var(--primary-hover); }
</style></head>
<body class="paper-soft">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px;">
    <div class="eyebrow">DISPLAY · INSTRUMENT SERIF · SOFT EDITORIAL</div>
    <div class="meta">112 / 76 / 40 / 28</div>
  </div>

  <div class="stack">
    <div class="row">
      <span class="meta">XL · 88</span>
      <span class="specimen xl">Your marketing office.</span>
    </div>
    <div class="rule"></div>
    <div class="row">
      <span class="meta">LG · 60</span>
      <span class="specimen lg">Staffed by twenty-one <em class="ampersand">strategists.</em></span>
    </div>
    <div class="rule"></div>
    <div class="row">
      <span class="meta">MD · 38</span>
      <span class="specimen md">Meet the Council.</span>
    </div>
    <div class="row">
      <span class="meta">SM · 26</span>
      <span class="specimen sm">A calmer way to ship marketing.</span>
    </div>
    <div class="rule"></div>
    <div class="row">
      <span class="meta">GLYPHS</span>
      <div class="glyph-row">
        <span class="g">Aa</span><span class="g it">Bb</span><span class="g">Rr</span><span class="g it">&amp;</span><span class="g">Qq</span><span class="g it">21</span>
      </div>
    </div>
  </div>
</body></html>

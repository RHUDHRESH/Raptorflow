<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Paper</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 10px; padding: 12px; height: 92px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
  .sw .name { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; font-weight: 600; opacity: 0.85; }
</style></head>
<body class="paper-soft">
  <div class="grid">
    <div class="sw" style="background:var(--paper-50); color:var(--ink-700)"><span class="name">paper-50</span><span class="hex">#FAF7F1</span></div>
    <div class="sw" style="background:var(--paper-100); color:var(--ink-700)"><span class="name">paper-100</span><span class="hex">#FBF8F2</span></div>
    <div class="sw" style="background:var(--paper-150); color:var(--ink-700)"><span class="name">paper-150</span><span class="hex">#F5F1E8</span></div>
    <div class="sw" style="background:var(--paper-200); color:var(--ink-700)"><span class="name">paper-200</span><span class="hex">#EFE9DC</span></div>
    <div class="sw" style="background:var(--paper-300); color:var(--ink-700)"><span class="name">paper-300</span><span class="hex">#E6DFCE</span></div>
    <div class="sw" style="background:#FFFFFF; color:var(--ink-700)"><span class="name">card</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:var(--paper-400); color:#fff"><span class="name">paper-400</span><span class="hex">#C9C0AB</span></div>
    <div class="sw" style="background:var(--ink-300); color:#fff"><span class="name">ink-300</span><span class="hex">#BAB0A0</span></div>
    <div class="sw" style="background:var(--ink-400); color:#fff"><span class="name">ink-400</span><span class="hex">#9C9384</span></div>
    <div class="sw" style="background:var(--ink-500); color:#fff"><span class="name">ink-500</span><span class="hex">#7A7268</span></div>
  </div>
</body></html>

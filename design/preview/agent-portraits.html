<!doctype html>
<html><head><meta charset="utf-8"><title>Agent Portraits</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { display:flex; gap:14px; align-items:center; }
  .agent { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .mono { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-mono); font-size:18px; font-weight:700; letter-spacing:0.04em; box-shadow:var(--shadow-sm); position:relative; }
  .dot { position:absolute; bottom:-2px; right:-2px; width:14px; height:14px; border-radius:9999px; border:3px solid var(--paper-100); }
  .nm { font-family:var(--font-mono); font-size:9px; font-weight:600; color:var(--ink-500); letter-spacing:0.1em; text-transform:uppercase; }
  .pill { display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--border); border-radius:9999px; padding:5px 12px 5px 5px; box-shadow:var(--shadow-xs); }
  .pill .mn { width:24px; height:24px; border-radius:6px; color:#fff; font-family:var(--font-mono); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .pill .nm2 { font-family:var(--font-body); font-size:12px; color:var(--ink-900); font-weight:500; }
</style></head>
<body class="paper-soft">
  <div class="row">
    <div class="agent">
      <div class="mono" style="background:#8B6FC2">OG<span class="dot" style="background:var(--primary)"></span></div>
      <span class="nm">OG · CREATIVE</span>
    </div>
    <div class="agent">
      <div class="mono" style="background:#4F87B8">GV<span class="dot" style="background:var(--leaf-confirm)"></span></div>
      <span class="nm">GV · DIGITAL</span>
    </div>
    <div class="agent">
      <div class="mono" style="background:#B8556B">AR<span class="dot" style="background:var(--ink-400)"></span></div>
      <span class="nm">AR · STRATEGY</span>
    </div>
    <div class="agent">
      <div class="mono" style="background:#4A433C">ST<span class="dot" style="background:var(--primary)"></span></div>
      <span class="nm">ST · LEAD</span>
    </div>
    <div style="margin-left:14px; display:flex; flex-direction:column; gap:6px;">
      <span class="pill"><span class="mn" style="background:#8B6FC2">OG</span><span class="nm2">David Ogilvy</span></span>
      <span class="pill"><span class="mn" style="background:#4F87B8">GV</span><span class="nm2">Gary Vaynerchuk</span></span>
    </div>
  </div>
</body></html>

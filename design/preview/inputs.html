<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .stack { display:flex; flex-direction:column; gap:12px; max-width:380px; }
  label { font-family:var(--font-mono); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-500); }
  .field { display:flex; flex-direction:column; gap:6px; }
  input, textarea, select { font-family:var(--font-body); font-size:14px; color:var(--ink-900); background:#fff; border:1px solid var(--border); border-radius:10px; padding:10px 12px; outline:none; transition:all 200ms var(--ease-soft); box-shadow:var(--shadow-xs); }
  input:focus, textarea:focus, select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(217,119,87,0.15); }
  .hint { font-size:12px; color:var(--ink-400); }
</style></head>
<body class="paper-soft">
  <div class="stack">
    <div class="field"><label>Campaign name</label><input value="Diya Organics — Monsoon Launch"></div>
    <div class="field"><label>Brief</label><textarea rows="2" placeholder="What's the move?">A 4-week awareness push targeting Tier-2 mothers.</textarea></div>
    <div class="field"><label>Goal</label><select><option>Awareness</option><option>Leads</option><option>Conversion</option></select></div>
    <div class="hint">The Strategist will draft 3 moves from this brief.</div>
  </div>
</body></html>
